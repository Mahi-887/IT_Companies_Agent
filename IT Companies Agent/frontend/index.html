<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevPulse AI | Intelligent Engineering Shadow</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%232ECC71'/><path d='M30 50 L45 65 L70 35' stroke='white' stroke-width='10' fill='none'/></svg>">
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <div class="logo-icon"></div>
                <h1 class="logo-text">DevPulse AI</h1>
            </div>
        </div>
        
        <nav class="sidebar-nav">
            <div class="nav-section">
                <p class="nav-label">Core</p>
                <a href="#" class="nav-item active" id="nav-chat">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 21 1.9-5.7a8.5 8.5 0 1 1 3.8 3.8z"/></svg>
                    <span>Knowledge Query</span>
                </a>
                <a href="#" class="nav-item" id="nav-docs">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>
                    <span>Auto-Docs</span>
                </a>
                <a href="#" class="nav-item" id="nav-debug">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m8 2 1.88 1.88"/><path d="M12.47 4.54 11 6"/><path d="m18 2-1.88 1.88"/><path d="M20.24 7.69 19 8.76"/><path d="m3.76 7.69 1.24 1.07"/><path d="M4.93 19.07 15 9"/><path d="M16 13c0 2.2-1.8 4-4 4"/><path d="M13 3c2.2 0 4 1.8 4 4"/><path d="M10 21c-2.2 0-4-1.8-4-4"/><path d="M7 11c0-2.2 1.8-4 4-4"/></svg>
                    <span>Debug Analyzer</span>
                </a>
            </div>

            <div class="nav-section">
                <p class="nav-label">Repositories</p>
                <div id="repo-list">
                    <!-- Dynamic Repo List -->
                    <div class="nav-item">
                        <span>devpulse-backend</span>
                    </div>
                </div>
            </div>
        </nav>
    </aside>

    <main class="main-container">
        <header class="main-header">
            <div style="display:flex;align-items:center;gap:12px;">
                <button class="sidebar-toggle" id="sidebar-toggle" aria-label="Toggle navigation">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                </button>
                <div class="repo-badge">
                    <div class="status-dot"></div>
                    <span id="active-repo-name">devpulse-backend</span>
                </div>
            </div>
            <div class="header-actions">
                <!-- Additional controls -->
            </div>
        </header>

        <section class="chat-window" id="chat-window">
            <div class="message ai">
                <div class="message-bubble">
                    Hello! I'm your DevPulse AI shadow. I've indexed your current repository. How can I help you navigate the codebase today?
                </div>
            </div>
        </section>

        <footer class="input-container">
            <div class="input-wrapper">
                <input type="text" id="query-input" placeholder="Ask a question about the repository..." autocomplete="off">
                <button class="send-btn" id="send-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </div>
        </footer>
    </main>

    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    <script src="app.js"></script>
</body>
</html>
